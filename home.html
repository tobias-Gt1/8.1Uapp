<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>U Festival</title>
    <link rel="manifest" href="manifest.json">
    <!-- Onsen UI (optional components for mobile UI) -->
    <link rel="stylesheet" href="https://unpkg.com/onsenui/css/onsenui.min.css">
    <link rel="stylesheet" href="https://unpkg.com/onsenui/css/onsen-css-components.min.css">
    <script src="https://unpkg.com/onsenui/js/onsenui.min.js"></script>
    <style>
      :root {
        --black: #050505;
        --red: #ff3b2f;
        --blue: #2d83ab;
        --blue-dark: #2a769a;
        --paper: #ffffff;
        --ink: #111111;
        --muted: #2e2e2e;
        --shadow: rgba(0, 0, 0, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #ffffff;
        color: var(--ink);
        font-family: "Aptos", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      body {
        padding: 0;
        overflow-x: hidden;
        overflow-y: auto;
      }

      .phone {
        width: 100%;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        background: var(--paper);
        overflow: hidden;
      }

      .header {
        min-height: calc(108px + env(safe-area-inset-top));
        background: var(--black);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: env(safe-area-inset-top)
          calc(17px + env(safe-area-inset-right)) 0
          calc(20px + env(safe-area-inset-left));
        flex: 0 0 auto;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .brand__mark {
        width: 78px;
        height: auto;
        display: block;
        flex: 0 0 auto;
      }

      .brand__name {
        font-size: 27px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: -0.04em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .header__actions {
        display: flex;
        align-items: center;
        gap: 18px;
        flex: 0 0 auto;
      }

      .header__toggle {
        width: 41px;
        height: 41px;
        position: relative;
        border-radius: 50%;
        background: var(--red);
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.05);
      }

      .header__toggle::before {
        content: "";
        position: absolute;
        inset: 0 51% 0 0;
        background: #080808;
        border-radius: 50% 0 0 50%;
      }

      .header__toggle::after {
        content: "";
        position: absolute;
        inset: 6px 6px 6px 51%;
        background: var(--red);
        border-radius: 0 50% 50% 0;
      }

      .flag {
        width: 38px;
        height: 24px;
        border-radius: 1px;
        overflow: hidden;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.12);
        display: grid;
        grid-template-rows: repeat(3, 1fr);
        flex: 0 0 auto;
      }

      .flag span {
        display: block;
      }

      .flag__red {
        background: #ff4538;
      }

      .flag__white {
        background: #ffffff;
      }

      .flag__blue {
        background: #62a8cf;
      }

      .content {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
        background: #fff;
        padding: 14px max(6px, env(safe-area-inset-right))
          calc(18px + env(safe-area-inset-bottom))
          max(6px, env(safe-area-inset-left));
        display: flex;
        align-items: stretch;
        justify-content: flex-start;
      }

      .welcome {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 22px;
        padding: 18px 16px 24px;
        text-align: center;
      }

      .welcome__text {
        margin: 0;
        max-width: 9ch;
        color: var(--black);
        font-size: clamp(2.6rem, 8vw, 5.2rem);
        line-height: 0.95;
        font-weight: 900;
        letter-spacing: -0.07em;
        text-wrap: balance;
      }

      .lineup {
        display: grid;
        gap: 12px;
        padding: 8px 0 0;
      }

      .lineup__title {
        margin: 0;
        color: var(--blue-dark);
        font-size: clamp(1.1rem, 3.4vw, 1.5rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        text-transform: uppercase;
      }

      .lineup__grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 10px;
      }

      .artist-tile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 10px;
        border-radius: 12px;
        background: linear-gradient(180deg, #ffffff 0%, #f7f9fb 100%);
        color: var(--ink);
        text-decoration: none;
        box-shadow: 0 6px 14px rgba(16, 24, 40, 0.06);
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      .artist-tile:hover {
        transform: translateY(-6px);
        box-shadow: 0 10px 28px rgba(16, 24, 40, 0.12);
      }

      .artist-photo {
        width: 100%;
        height: 110px;
        object-fit: cover;
        border-radius: 10px;
        background: linear-gradient(180deg,#e6eef6 0%,#dfeefc 100%);
      }

      .artist-name {
        font-weight: 800;
        font-size: 0.95rem;
        text-align: center;
        color: var(--muted);
      }

      /* Modal for bios */
      .bio-modal {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(0,0,0,0.45);
        z-index: 1200;
        padding: 24px;
      }

      .bio-sheet {
        width: min(760px, 96%);
        max-height: 92vh;
        overflow: auto;
        background: #fff;
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 20px 40px rgba(2,6,23,0.35);
      }

      .bio-head {
        display:flex;
        gap:12px;
        align-items:center;
        margin-bottom:12px;
      }

      .bio-head img { width:96px; height:72px; object-fit:cover; border-radius:8px }

      .bio-title { font-size:1.4rem; font-weight:800; margin:0 }

      .bio-close { margin-left:auto; background:transparent;border:0;font-size:1.1rem;cursor:pointer }

      .bio-body { color:var(--muted); line-height:1.5; font-size:1rem }

      .lineup__item {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 54px;
        padding: 10px 12px;
        border-radius: 16px;
        background: linear-gradient(180deg, #2f88b0 0%, #2d84ac 100%);
        color: #fff;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1.1;
        box-shadow: 0 8px 18px rgba(45, 132, 172, 0.18);
      }

      .lineup__item:nth-child(3n + 1) {
        background: linear-gradient(180deg, #ff735d 0%, #f03228 100%);
      }

      .lineup__item:nth-child(3n + 2) {
        background: linear-gradient(180deg, #53a9d0 0%, #247ba0 100%);
      }

      .lineup__item:nth-child(3n) {
        background: linear-gradient(180deg, #f5c94f 0%, #e3b505 100%);
        color: #111111;
      }

      .accordion {
        height: 70px;
        border-radius: 18px;
        background: linear-gradient(180deg, #2f88b0 0%, #2d84ac 100%);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px 0 22px;
        margin-bottom: 6px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .accordion:focus-visible,
      .nav-item:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.9);
        outline-offset: 3px;
      }

      .accordion__title {
        margin: 0;
        font-size: clamp(1.9rem, 5.9vw, 2.6rem);
        line-height: 1;
        font-style: italic;
        font-weight: 300;
        letter-spacing: -0.03em;
        white-space: nowrap;
      }

      .accordion__arrow {
        width: 26px;
        height: 26px;
        flex: 0 0 auto;
        filter: brightness(0) invert(1);
        opacity: 0.98;
      }

      .accordion--open .accordion__arrow {
        transform: rotate(90deg);
        transform-origin: center;
      }

      .accordion--active {
        transform: translateY(-1px);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.15),
          0 6px 14px rgba(0, 0, 0, 0.08);
      }

      .section {
        padding: 27px 24px 18px;
      }

      .section h2 {
        margin: 0 0 22px;
        color: var(--blue-dark);
        font-size: 22px;
        line-height: 1.05;
        font-weight: 700;
      }

      .section p {
        margin: 0 0 22px;
        font-size: 18px;
        line-height: 1.42;
        color: var(--muted);
        max-width: 100%;
      }

      .footer {
        min-height: calc(108px + env(safe-area-inset-bottom));
        background: var(--red);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        align-items: center;
        gap: 8px;
        padding: 0 calc(16px + env(safe-area-inset-right))
          env(safe-area-inset-bottom) calc(16px + env(safe-area-inset-left));
        flex: 0 0 auto;
      }

      .nav-item {
        appearance: none; 
        border: 0;
        background: transparent;
        padding: 0;
        display: grid;
        place-items: center;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition:
          transform 140ms ease,
          opacity 140ms ease;
      }

      .nav-item--active {
        transform: translateY(-2px) scale(1.02);
        opacity: 1;
      }

      .nav-item:not(.nav-item--active) {
        opacity: 0.82;
      }

      .nav-item img,
      .nav-item svg {
        display: block;
      }

      .nav-icon--home {
        width: 38px;
        height: 38px;
      }

      .nav-icon--info {
        width: 40px;
        height: 40px;
      }

      .nav-icon--music {
        width: 32px;
        height: 32px;
      }

      .nav-icon--pin {
        width: 38px;
        height: 38px;
        color: #fff;
      }

      @media (min-width: 768px) {
        .phone {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="phone" aria-label="U Festival home screen">
      <header class="header">
        <div class="brand" aria-label="U Festival">
          <img
            class="brand__mark"
            src="assets/logo_white.svg"
            alt="U Festival logo"
          />
          <span class="brand__name">Festival</span>
        </div>

        <div class="header__actions" aria-hidden="true">
          <div class="header__toggle"></div>
          <div class="flag" aria-label="Nederlandse vlag">
            <span class="flag__red"></span>
            <span class="flag__white"></span>
            <span class="flag__blue"></span>
          </div>
        </div>
      </header>

      <section class="content" aria-label="Welkom">
        <div class="welcome">
          <h1 class="welcome__text">Welkom Bij het U festival!</h1>
          <section class="lineup" aria-label="Line-up">
            <h2 class="lineup__title">Line-up</h2>
            <div id="lineupGrid" class="lineup__grid" aria-live="polite">
              <!-- Artist tiles will be rendered here -->
            </div>
          </section>
        </div>
      </section>

      <!-- Bio modal -->
      <div id="bioModal" class="bio-modal" style="display:none" aria-hidden="true">
        <div class="bio-sheet" role="dialog" aria-modal="true">
          <div class="bio-head">
            <img id="bioImg" src="" alt="artist image" />
            <div>
              <h3 id="bioName" class="bio-title"></h3>
              <p id="bioSub" style="margin:4px 0 0;color:var(--muted)"></p>
            </div>
            <button id="bioClose" class="bio-close" aria-label="Close">✕</button>
          </div>
          <div id="bioBody" class="bio-body"></div>
        </div>
      </div>

      <footer class="footer" aria-label="Navigatie">
        <a class="nav-item nav-item--active" href="home.html" aria-label="Home">
          <img
            class="nav-icon--home"
            src="assets/home_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png"
            alt="Home"
          />
        </a>

        <a class="nav-item" href="info.html" aria-label="Info">
          <img
            class="nav-icon--info"
            src="assets/info_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png"
            alt="Info"
          />
        </a>

        <a class="nav-item" href="agenda.html" aria-label="Agenda">
          <img
            class="nav-icon--music"
            src="assets/music_note_2_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png"
            alt="Agenda"
          />
        </a>

        <a class="nav-item" href="map.html" aria-label="Kaart">
          <svg
            class="nav-icon--pin"
            viewBox="0 0 24 24"
            aria-hidden="true"
            role="presentation"
          >
            <path
              d="M12 21.25s6.5-5.73 6.5-10.75A6.5 6.5 0 0 0 12 4a6.5 6.5 0 0 0-6.5 6.5c0 5.02 6.5 10.75 6.5 10.75Z"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
              stroke-linejoin="round"
            />
            <circle
              cx="12"
              cy="10.5"
              r="2.2"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
            />
          </svg>
        </a>
      </footer>
    </main>

    <script>
      function initNavigation() {
        const currentPage = window.location.pathname.split('/').pop() || 'home.html';
        document.querySelectorAll('.nav-item').forEach(item => {
          item.classList.remove('nav-item--active');
          if (item.getAttribute('href') === currentPage ||
              (currentPage === '' && item.getAttribute('href') === 'home.html')) {
            item.classList.add('nav-item--active');
          }
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initNavigation);
      } else {
        initNavigation();
      }

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('Service Worker Registered'))
          .catch(e => console.warn('SW registration failed:', e));
      }
    </script>

    <script src="events-data.js"></script>
    <script>
      const HOME_ARTISTS = [
        { name: 'Armin van Buuren', description: 'Trance icon', image: 'assets/artists/armin_van_buuren.png', bio: 'Five-time “World’s No. 1 DJ” and trance icon, Armin delivers euphoric, high-energy sets that have headlined festivals from Tomorrowland to Ultra. His uplifting melodies and impeccable mixing keep crowds dancing for hours.' },
        { name: 'Martin Garrix', description: 'EDM superstar', image: 'assets/artists/martin_garrix.png', bio: 'Broke through as a teenager with “Animals,” Martin Garrix has become one of the biggest names in EDM. His anthemic big-room tracks and stadium-sized drops make him a festival favorite across Europe.' },
        { name: 'Kensington', description: 'Indie rock anthems', image: 'assets/artists/kensington.png', bio: 'Rotterdam-born indie rock quintet known for soaring choruses and driving guitar riffs. Hits like “Streets” and “Riddles” showcase their knack for arena-ready hooks and emotionally charged lyricism.' },
        { name: 'Within Temptation', description: 'Symphonic metal pioneers', image: 'assets/artists/within_temptation.png', bio: 'Symphonic metal pioneers fronted by Sharon den Adel. Their cinematic soundscapes and operatic vocals translate into dramatic, visually stunning festival performances.' },
        { name: 'De Staat', description: 'Experimental rock innovators', image: 'assets/artists/de_staat.png', bio: 'Experimental rock outfit from Nijmegen, blending funky grooves with angular guitar work and theatrical stagecraft. Tracks like “Witch Doctor” and “Down Town” highlight their genre-bending approach and infectious energy.' },
        { name: 'Chef\'Special', description: 'Genre-blending funk-pop', image: 'assets/artists/chef_special.png', bio: 'A four-piece from Haarlem mixing funk, pop, rock and hip-hop. Their upbeat, genre-fluid sound on songs like “Amigo” and “In Your Arms” makes for joyous, dance-floor-friendly live shows.' },
        { name: 'Navarone', description: 'Hard-hitting rock four-piece', image: 'assets/artists/navarone.png', bio: 'Utrecht’s hard-hitting rock four-piece, delivering riff-driven anthems and dynamic vocals. With a live reputation for raw intensity, they’re tailor-made for late-night main stages.' },
        { name: 'Dotan', description: 'Folk-pop singer-songwriter', image: 'assets/artists/dotan.png', bio: 'Folk-pop singer-songwriter whose intimate voice and acoustic arrangements (notably on “Home”) have earned him platinum sales and sell-out shows. His heartfelt storytelling connects deeply on festival acoustic stages.' },
        { name: 'Eefje de Visser', description: 'Atmospheric indie-pop', image: 'assets/artists/eefje_de_visser.png', bio: 'Indie-pop artist crafting atmospheric, electronic-tinged songs. Her hypnotic vocals and lush production (as heard on “Ongeveer”) create a dreamlike vibe perfect for twilight festival slots.' },
        { name: 'Froukje', description: 'Candid pop songwriter', image: 'assets/artists/froukje.png', bio: 'Breakthrough pop singer Froukje Veenstra combines candid lyrics with catchy, synth-driven hooks. Since her 2021 debut, she’s become a voice of her generation—ideal for mid-day festival stages.' },
        { name: 'Spinvis', description: 'Poetic lo-fi surrealist in pop form', image: 'assets/artists/spinvis.png', bio: 'Erik de Jong performs under the moniker Spinvis, crafting poetic, collage-like songs that blend spoken-word snippets, lo-fi electronics and wistful pop. His live shows turn everyday observations into shared, dreamlike experiences.' }
      ];

      function initialsFor(name) {
        return name.split(' ').map(s => s[0]).slice(0,2).join('').toUpperCase();
      }

      function makeFallbackDataURL(name, w=400, h=300) {
        const initials = initialsFor(name);
        const bg = '#dfeefc';
        const fg = '#102028';
        const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${w}' height='${h}'><rect width='100%' height='100%' fill='${bg}'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='Arial, Helvetica, sans-serif' font-size='48' fill='${fg}'>${initials}</text></svg>`;
        return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
      }

      function renderLineup() {
        const grid = document.getElementById('lineupGrid');
        const artists = (window.ARTISTS && window.ARTISTS.length) ? window.ARTISTS : HOME_ARTISTS;
        if (!grid) return;
        grid.innerHTML = '';
        artists.forEach(artist => {
          const a = document.createElement('a');
          a.className = 'artist-tile';
          a.href = '#';
          a.setAttribute('data-artist-id', artist.id || artist.name);

          const img = document.createElement('img');
          img.className = 'artist-photo';
          img.alt = artist.name;
          img.src = artist.image || makeFallbackDataURL(artist.name);
          img.onerror = function(){ this.onerror=null; this.src = makeFallbackDataURL(artist.name); };

          const name = document.createElement('div');
          name.className = 'artist-name';
          name.textContent = artist.name;

          a.appendChild(img);
          a.appendChild(name);

          a.addEventListener('click', (ev) => {
            ev.preventDefault();
            showBioFor(artist.id || artist.name);
          });

          grid.appendChild(a);
        });
      }

      function showBioFor(id) {
        const artists = (window.ARTISTS && window.ARTISTS.length) ? window.ARTISTS : HOME_ARTISTS;
        const artist = artists.find(a => a.id === Number(id) || a.name === id);
        if (!artist) return;
        document.getElementById('bioImg').src = artist.image || makeFallbackDataURL(artist.name);
        document.getElementById('bioImg').onerror = function(){ this.onerror=null; this.src = makeFallbackDataURL(artist.name); };
        document.getElementById('bioName').textContent = artist.name;
        document.getElementById('bioSub').textContent = artist.description || '';
        document.getElementById('bioBody').innerHTML = artist.bio ? ('<p>' + artist.bio + '</p>') : '';
        const modal = document.getElementById('bioModal');
        modal.style.display = 'grid';
        modal.setAttribute('aria-hidden','false');
      }

      function hideBio() {
        const modal = document.getElementById('bioModal');
        modal.style.display = 'none';
        modal.setAttribute('aria-hidden','true');
      }

      document.addEventListener('DOMContentLoaded', () => {
        renderLineup();
        document.getElementById('bioClose').addEventListener('click', hideBio);
        document.getElementById('bioModal').addEventListener('click', (e) => {
          if (e.target === e.currentTarget) hideBio();
        });
      });
    </script>
  </body>
</html>
